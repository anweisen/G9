<!DOCTYPE html>
<html lang="de">
<head>
  <!-- https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base '--base-href' in 'flutter build' -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta http-equiv="Content-Type" content="text/html;charset=UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Deine Notenapp für das Abitur im neuen G9 in Bayern.">

  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="darkreader-lock">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="G9">
  <link rel="apple-touch-icon" href="icons/icon-192x192.png">

  <!-- Basic SEO -->
  <link rel="canonical" href="https://g9.anweisen.net">
  <meta name="keywords" content="G9, Notenapp, Noten, Punkte, Einbringungen, Durchschnitt, Prognose, Abitur, Abi, Bayern, Notenrechner, Oberstufe, Gymnasium, LehrplanPlus, berechnen">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="de_DE">
  <meta property="og:site_name" content="g9.anweisen.net">
  <meta property="og:url" content="https://g9.anweisen.net">
  <meta property="og:image" content="https://g9.anweisen.net/icons/icon-192x192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="icons/icon-192x192.png"/>
  <link rel="icon" type="image/x-icon" href="favicon.ico"/>

  <title>G9 Notenapp</title>
  <link rel="manifest" href="manifest.json">

  <link rel="preload" href="main.dart.js" as="script">

  <!-- This script adds the flutter initialization JS code -->
  <script src="flutter.js" defer></script>

  <meta http-equiv="Content-Security-Policy"
        content="default-src * 'self' 'unsafe-inline' 'unsafe-eval';
             script-src * 'self' 'unsafe-inline' 'unsafe-eval' blob:;
             worker-src 'self' blob:;
             child-src 'self' blob:;
             img-src * 'self' data: blob:;
             connect-src * 'self' blob:;">

  <style>
    body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      background-color: #fff; /* default to white mode */
    }
    #loading-bar-indicator {
      background-color: rgb(117, 116, 131);
    }
    #loading-bar {
      background-color: rgb(228, 233, 240);
    }
    @media (prefers-color-scheme: dark) {
      body {
        background-color: #000;
      }
      #loading-bar {
        background-color: rgba(28, 28, 32);
      }
    }
    #loading-indicator {
      position: absolute;
      top: 53%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    #loading-bar {
      position: relative;
      width: max(min(20vw, 300px), 180px);
      height: 9px;
      border-radius: 4px;
    }
    #loading-bar-indicator {
      transition: width linear .2s;
      position: absolute;
      height: 100%;
      border-radius: 4px;
      width: 0; /* initial value */
      content: '';
      animation: loading-bar-indicator-splash .8s linear infinite alternate;
    }
    @keyframes loading-bar-indicator-splash {
      from, to { opacity: 1; }
      50% { opacity: 0.6; }
    }
  </style>
</head>
<body>
  <div id="loading-indicator"><div id="loading-bar"><div id="loading-bar-indicator"></div></div></div>
  <script>
      {{flutter_js}}
      {{flutter_build_config}}

      let schedulerId;
      function updateProgress(progress, maxInterval) {
        const loader = document.querySelector("#loading-bar-indicator");
        if (loader) {
          loader.style.width = `${progress}%`;
          if (progress >= maxInterval) return;
          if (schedulerId !== undefined) clearTimeout(schedulerId);
          schedulerId = setTimeout(() => updateProgress(progress + (maxInterval - progress) / 10.0, maxInterval), 200);
        }
      }
      function removeProgress() {
        const loader = document.querySelector("#loading-indicator");
        if (loader) loader.remove();
      }
      updateProgress(0, 5);
      window.addEventListener('load', function(ev) {
        updateProgress(5, 60);
        _flutter.loader.load({
          onEntrypointLoaded: async function(engineInitializer) {
            updateProgress(60, 80);
            const appRunner = await engineInitializer.initializeEngine();
            updateProgress(80, 90);

            await appRunner.runApp();
            updateProgress(90, 100);

            setTimeout(removeProgress, 2000);
          }
        });
      });
  </script>
</body>
</html>
